<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BARBER MANAGER - 理容室予約管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0e0c; font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif; }
    select option { background: #222018; color: #f0ead6; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1916; }
    ::-webkit-scrollbar-thumb { background: #2e2b25; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========== GOOGLE SHEETS SYNC ==========
    async function syncToSheets(action, data) {
      const apiUrl = localStorage.getItem("gs_api_key");
      if (!apiUrl || !apiUrl.startsWith("http")) return { ok: false, error: "URL未設定" };
      try {
        const payload = { action, ...data };
        // Apps Script requires no-cors or a proper CORS-enabled endpoint
        // We use a form-encoded POST which Apps Script accepts more reliably
        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          mode: "no-cors", // Apps Script requires this from browser
        });
        // no-cors returns opaque response, so we assume success if no exception
        return { ok: true };
      } catch (e) {
        return { ok: false, error: e.message };
      }
    }

    const theme = {
      bg: "#0f0e0c", surface: "#1a1916", card: "#222018", border: "#2e2b25",
      accent: "#c9a84c", accentLight: "#e0c06a", accentDark: "#9a7a30",
      text: "#f0ead6", textMuted: "#8a8070", textDim: "#5a5448",
      danger: "#c0392b", success: "#27ae60", info: "#2980b9",
    };

    const INITIAL_MENUS = [
      { id: 1, name: "カット", duration: 60, price: 3800 },
      { id: 2, name: "カット＋シャンプー", duration: 60, price: 4800 },
      { id: 3, name: "シェービング", duration: 60, price: 2500 },
      { id: 4, name: "パーマ", duration: 120, price: 8000 },
      { id: 5, name: "カラー", duration: 90, price: 6000 },
    ];

    const INITIAL_CUSTOMERS = [
      { id: 1, name: "田中 太郎", phone: "090-1234-5678", email: "tanaka@example.com", memo: "常連客" },
      { id: 2, name: "鈴木 一郎", phone: "080-9876-5432", email: "suzuki@example.com", memo: "" },
      { id: 3, name: "山田 花子", phone: "070-1111-2222", email: "yamada@example.com", memo: "アレルギーあり" },
    ];

    const HOURS = Array.from({ length: 11 }, (_, i) => i + 9);
    const DAY_NAMES = ["月", "火", "水", "木", "金", "土", "日"];

    function generateId() { return Date.now() + Math.random().toString(36).slice(2); }
    function formatDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }
    function getWeekDates(base) {
      const day = base.getDay();
      const monday = new Date(base);
      monday.setDate(base.getDate() - ((day + 6) % 7));
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
      });
    }

    const S = {
      th: { padding:"10px 12px", textAlign:"left", color:theme.textMuted, fontSize:12, fontWeight:600, borderBottom:`1px solid ${theme.border}`, whiteSpace:"nowrap" },
      td: { padding:"10px 12px", color:theme.textMuted, fontSize:13 },
      input: { width:"100%", background:theme.card, border:`1px solid ${theme.border}`, borderRadius:8, padding:"10px 14px", color:theme.text, fontSize:14, marginBottom:12, boxSizing:"border-box", outline:"none", fontFamily:"inherit" },
      select: { width:"100%", background:theme.card, border:`1px solid ${theme.border}`, borderRadius:8, padding:"10px 14px", color:theme.text, fontSize:14, marginBottom:12, boxSizing:"border-box", outline:"none", fontFamily:"inherit", cursor:"pointer" },
      label: { display:"block", color:theme.textMuted, fontSize:12, marginBottom:6, fontWeight:600, letterSpacing:"0.05em" },
      btnPrimary: { background:theme.accent, color:"#000", border:"none", borderRadius:8, padding:"10px 20px", fontWeight:700, cursor:"pointer", fontSize:13, fontFamily:"inherit", whiteSpace:"nowrap" },
      btnSecondary: { background:"transparent", color:theme.textMuted, border:`1px solid ${theme.border}`, borderRadius:8, padding:"10px 20px", fontWeight:600, cursor:"pointer", fontSize:13, fontFamily:"inherit" },
      navBtn: { background:theme.card, color:theme.text, border:`1px solid ${theme.border}`, borderRadius:8, padding:"8px 16px", cursor:"pointer", fontSize:14, fontFamily:"inherit" },
      actionBtn: { background:theme.card, color:theme.textMuted, border:`1px solid ${theme.border}`, borderRadius:6, padding:"5px 12px", cursor:"pointer", fontSize:12, fontFamily:"inherit" },
      seatBtn: { flex:1, background:theme.card, color:theme.textMuted, border:`1px solid ${theme.border}`, borderRadius:8, padding:"8px", cursor:"pointer", fontSize:13, fontFamily:"inherit" },
      seatBtnActive: { background:theme.accent, color:"#000", border:`1px solid ${theme.accent}` },
      overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, backdropFilter:"blur(4px)" },
      modal: { background:theme.surface, border:`1px solid ${theme.border}`, borderRadius:14, padding:28, width:"min(95vw,460px)", maxHeight:"90vh", overflowY:"auto" },
      modalTitle: { color:theme.text, fontSize:18, fontWeight:800, marginBottom:18, marginTop:0 },
      btnRow: { display:"flex", gap:10, justifyContent:"flex-end", marginTop:8 },
      menuCard: { background:theme.card, border:`1px solid ${theme.border}`, borderRadius:12, padding:18 },
      kpiCard: { background:theme.card, border:`1px solid ${theme.border}`, borderRadius:12, padding:"16px 20px" },
      kpiLabel: { color:theme.textMuted, fontSize:12, marginBottom:6, fontWeight:600 },
      kpiValue: { color:theme.accent, fontSize:26, fontWeight:800 },
      card: { background:theme.card, border:`1px solid ${theme.border}`, borderRadius:12, padding:20 },
      cardTitle: { color:theme.text, fontSize:14, fontWeight:700, marginTop:0, marginBottom:16 },
    };

    // ========== GOOGLE SHEETS MODAL ==========
    function GoogleSheetsModal({ onClose }) {
      const [apiUrl, setApiUrl] = useState(localStorage.getItem("gs_api_key") || "");
      const [status, setStatus] = useState({ msg:"", ok:true });
      const [testing, setTesting] = useState(false);

      const save = () => {
        if (!apiUrl.startsWith("http")) { setStatus({msg:"URLを正しく入力してください", ok:false}); return; }
        localStorage.setItem("gs_api_key", apiUrl);
        setStatus({msg:"✅ URLを保存しました", ok:true});
      };

      const testConnection = async () => {
        if (!apiUrl.startsWith("http")) { setStatus({msg:"先にURLを入力してください", ok:false}); return; }
        setTesting(true);
        setStatus({msg:"🔄 接続テスト中...", ok:true});
        localStorage.setItem("gs_api_key", apiUrl);
        const result = await syncToSheets("test", {
          date: "テスト", hour: "--", seat: 0,
          customerName: "接続テスト", menuName: "テスト", price: 0, note: "この行は削除してください"
        });
        setTesting(false);
        if (result.ok) {
          setStatus({msg:"✅ 送信成功！スプレッドシートを確認してください", ok:true});
        } else {
          setStatus({msg:`❌ エラー: ${result.error}`, ok:false});
        }
      };

      const scriptCode = `// ================================
// Barber Manager - Apps Script
// ================================
const SHEET_NAME = "予約データ";

function doPost(e) {
  try {
    const d = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    
    // シートがなければ作成
    let sheet = ss.getSheetByName(SHEET_NAME);
    if (!sheet) {
      sheet = ss.insertSheet(SHEET_NAME);
      // ヘッダー行を追加
      sheet.appendRow(["日付","時間","席","顧客名","メニュー","金額","メモ","登録日時"]);
      sheet.getRange(1,1,1,8).setFontWeight("bold");
    }
    
    if (d.action === "test" || d.action === "add" || d.action === "edit") {
      sheet.appendRow([
        d.date,
        d.hour + ":00",
        "席" + d.seat,
        d.customerName || "",
        d.menuName || "",
        d.price || 0,
        d.note || "",
        new Date().toLocaleString("ja-JP")
      ]);
    }
    
    return ContentService
      .createTextOutput(JSON.stringify({ ok: true }))
      .setMimeType(ContentService.MimeType.JSON);
      
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ ok: false, error: err.message }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={{...S.modal, maxWidth:580}} onClick={e=>e.stopPropagation()}>
            <h2 style={S.modalTitle}>📊 Google スプレッドシート連携</h2>

            {/* Step 1 */}
            <div style={{background:"#1a1f2e", border:"1px solid #2a3a5a", borderRadius:10, padding:16, marginBottom:14}}>
              <div style={{color:"#7ab8f5", fontWeight:700, fontSize:13, marginBottom:10}}>① Apps Script にコードを貼る</div>
              <p style={{color:theme.textMuted, fontSize:12, marginBottom:10, lineHeight:1.6}}>
                スプレッドシートを開いて「拡張機能」→「Apps Script」を開き、<br/>
                下のコードを全部コピーして貼り付けて保存してください。
              </p>
              <div style={{position:"relative"}}>
                <pre style={{background:"#0d1117", border:"1px solid #2a3a5a", borderRadius:6, padding:12, fontSize:10, color:"#6dbf6d", lineHeight:1.7, overflowX:"auto", margin:0, whiteSpace:"pre-wrap"}}>
                  {scriptCode}
                </pre>
                <button onClick={()=>{navigator.clipboard.writeText(scriptCode); alert("コピーしました！");}}
                  style={{position:"absolute", top:8, right:8, background:"#2a3a5a", color:"#7ab8f5", border:"none", borderRadius:4, padding:"3px 10px", cursor:"pointer", fontSize:11}}>
                  コピー
                </button>
              </div>
            </div>

            {/* Step 2 */}
            <div style={{background:"#1a1f2e", border:"1px solid #2a3a5a", borderRadius:10, padding:16, marginBottom:14}}>
              <div style={{color:"#7ab8f5", fontWeight:700, fontSize:13, marginBottom:8}}>② デプロイする</div>
              <p style={{color:theme.textMuted, fontSize:12, lineHeight:1.7}}>
                Apps Script の画面で右上「<strong style={{color:theme.text}}>デプロイ</strong>」→「<strong style={{color:theme.text}}>新しいデプロイ</strong>」<br/>
                → 種類：<strong style={{color:theme.text}}>ウェブアプリ</strong>　アクセス：<strong style={{color:theme.text}}>全員</strong><br/>
                → 「デプロイ」→ 表示された <strong style={{color:theme.accent}}>URL をコピー</strong>
              </p>
            </div>

            {/* Step 3 */}
            <div style={{background:"#1a1f2e", border:"1px solid #2a3a5a", borderRadius:10, padding:16, marginBottom:14}}>
              <div style={{color:"#7ab8f5", fontWeight:700, fontSize:13, marginBottom:8}}>③ URL を貼り付けてテスト送信</div>
              <label style={S.label}>Apps Script の URL</label>
              <input style={{...S.input, marginBottom:10}} value={apiUrl} onChange={e=>setApiUrl(e.target.value)}
                placeholder="https://script.google.com/macros/s/.../exec"/>
              <div style={{display:"flex", gap:10}}>
                <button style={{...S.btnSecondary, flex:1}} onClick={save}>URLを保存</button>
                <button style={{...S.btnPrimary, flex:1, opacity:testing?0.6:1}} onClick={testConnection} disabled={testing}>
                  {testing ? "送信中..." : "🔌 接続テスト"}
                </button>
              </div>
            </div>

            {status.msg && (
              <div style={{background:status.ok?"#1a2a1a":"#2a1a1a", border:`1px solid ${status.ok?"#3a6a3a":"#6a3a3a"}`, borderRadius:8, padding:12, marginBottom:14}}>
                <p style={{color:status.ok?theme.success:theme.danger, fontSize:13, margin:0}}>{status.msg}</p>
              </div>
            )}

            <div style={S.btnRow}>
              <button style={S.btnSecondary} onClick={onClose}>閉じる</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== RESERVATION MODAL ==========
    function ReservationModal({ slot, customers, menus, onSave, onClose, onDelete, existing }) {
      const [customerId, setCustomerId] = useState(existing?.customerId || "");
      const [menuId, setMenuId] = useState(existing?.menuId || "");
      const [seat, setSeat] = useState(existing?.seat || 1);
      const [note, setNote] = useState(existing?.note || "");
      const selectedMenu = menus.find(m => m.id === Number(menuId));
      const handleSave = () => {
        if (!customerId || !menuId) return;
        const customer = customers.find(c => c.id === Number(customerId));
        const rsv = { id: existing?.id || generateId(), date: slot.date, hour: slot.hour, seat, customerId: Number(customerId), customerName: customer?.name, menuId: Number(menuId), menuName: selectedMenu?.name, price: selectedMenu?.price, note };
        syncToSheets(existing ? "edit" : "add", rsv);
        onSave(rsv);
      };
      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <h2 style={S.modalTitle}>{existing ? "予約を編集" : "新規予約"}</h2>
            <p style={{color:theme.accent, fontSize:13, marginBottom:16}}>📅 {slot.date}　⏰ {slot.hour}:00</p>
            <label style={S.label}>席</label>
            <div style={{display:"flex", gap:10, marginBottom:16}}>
              {[1,2].map(s=>(
                <button key={s} onClick={()=>setSeat(s)} style={{...S.seatBtn,...(seat===s?S.seatBtnActive:{})}}>席 {s}</button>
              ))}
            </div>
            <label style={S.label}>お客様</label>
            <select style={S.select} value={customerId} onChange={e=>setCustomerId(e.target.value)}>
              <option value="">選択してください</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <label style={S.label}>メニュー</label>
            <select style={S.select} value={menuId} onChange={e=>setMenuId(e.target.value)}>
              <option value="">選択してください</option>
              {menus.map(m=><option key={m.id} value={m.id}>{m.name}　¥{m.price.toLocaleString()}</option>)}
            </select>
            {selectedMenu && (
              <div style={{background:"#1a2030", border:"1px solid #2a3a5a", borderRadius:8, padding:10, marginBottom:14}}>
                <p style={{color:"#7ab8f5", fontSize:12, margin:0}}>⏱ {selectedMenu.duration}分　　💴 ¥{selectedMenu.price.toLocaleString()}</p>
              </div>
            )}
            <label style={S.label}>メモ</label>
            <textarea style={{...S.input, height:70, resize:"vertical"}} value={note} onChange={e=>setNote(e.target.value)} placeholder="備考など"/>
            <div style={S.btnRow}>
              {existing && <button style={{...S.btnSecondary, color:theme.danger, borderColor:theme.danger}} onClick={()=>onDelete(existing.id)}>削除</button>}
              <div style={{flex:1}}/>
              <button style={S.btnSecondary} onClick={onClose}>キャンセル</button>
              <button style={S.btnPrimary} onClick={handleSave} disabled={!customerId||!menuId}>保存</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== CUSTOMER MODAL ==========
    function CustomerModal({ customer, onSave, onClose }) {
      const [form, setForm] = useState(customer || {name:"",phone:"",email:"",memo:""});
      const set = (k,v) => setForm(p=>({...p,[k]:v}));
      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <h2 style={S.modalTitle}>{customer ? "顧客を編集" : "新規顧客登録"}</h2>
            <label style={S.label}>お名前 *</label>
            <input style={S.input} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="田中 太郎"/>
            <label style={S.label}>電話番号</label>
            <input style={S.input} value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="090-0000-0000"/>
            <label style={S.label}>メールアドレス</label>
            <input style={S.input} value={form.email} onChange={e=>set("email",e.target.value)} placeholder="email@example.com"/>
            <label style={S.label}>メモ</label>
            <textarea style={{...S.input, height:70, resize:"vertical"}} value={form.memo} onChange={e=>set("memo",e.target.value)}/>
            <div style={S.btnRow}>
              <button style={S.btnSecondary} onClick={onClose}>キャンセル</button>
              <button style={S.btnPrimary} onClick={()=>onSave({...form, id:customer?.id||generateId()})} disabled={!form.name}>保存</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== MENU MODAL ==========
    function MenuModal({ menu, onSave, onClose }) {
      const [form, setForm] = useState(menu || {name:"",duration:60,price:0});
      const set = (k,v) => setForm(p=>({...p,[k]:v}));
      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <h2 style={S.modalTitle}>{menu ? "メニューを編集" : "新規メニュー"}</h2>
            <label style={S.label}>メニュー名 *</label>
            <input style={S.input} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="カット"/>
            <label style={S.label}>所要時間（分）</label>
            <input style={S.input} type="number" value={form.duration} onChange={e=>set("duration",Number(e.target.value))}/>
            <label style={S.label}>料金（円）</label>
            <input style={S.input} type="number" value={form.price} onChange={e=>set("price",Number(e.target.value))}/>
            <div style={S.btnRow}>
              <button style={S.btnSecondary} onClick={onClose}>キャンセル</button>
              <button style={S.btnPrimary} onClick={()=>onSave({...form, id:menu?.id||generateId()})} disabled={!form.name}>保存</button>
            </div>
          </div>
        </div>
      );
    }

    // ========== CALENDAR VIEW ==========
    function CalendarView({ reservations, customers, menus, onAddReservation, onEditReservation }) {
      const [baseDate, setBaseDate] = useState(new Date());
      const [modal, setModal] = useState(null);
      const weekDates = getWeekDates(baseDate);
      const todayStr = formatDate(new Date());

      const getSlotRsvs = (date, hour) => {
        const ds = formatDate(date);
        return reservations.filter(r => r.date===ds && r.hour===hour);
      };
      const handleCellClick = (date, hour, seat) => {
        const ds = formatDate(date);
        const existing = reservations.find(r=>r.date===ds&&r.hour===hour&&r.seat===seat);
        setModal({slot:{date:ds,hour},seat,existing});
      };
      const handleSave = (r) => { modal?.existing ? onEditReservation(r) : onAddReservation(r); setModal(null); };
      const handleDelete = (id) => { onEditReservation({__delete:true,id}); setModal(null); };

      return (
        <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:16}}>
            <button style={S.navBtn} onClick={()=>{const d=new Date(baseDate);d.setDate(d.getDate()-7);setBaseDate(d);}}>‹</button>
            <button style={{...S.navBtn, fontSize:12, padding:"6px 14px"}} onClick={()=>setBaseDate(new Date())}>今日</button>
            <button style={S.navBtn} onClick={()=>{const d=new Date(baseDate);d.setDate(d.getDate()+7);setBaseDate(d);}}>›</button>
            <span style={{color:theme.text, fontWeight:700, fontSize:16}}>
              {weekDates[0].getFullYear()}年 {weekDates[0].getMonth()+1}月 {weekDates[0].getDate()}日 〜 {weekDates[6].getMonth()+1}月 {weekDates[6].getDate()}日
            </span>
          </div>
          <div style={{flex:1, overflow:"auto", borderRadius:12, border:`1px solid ${theme.border}`}}>
            <table style={{width:"100%", borderCollapse:"collapse", tableLayout:"fixed"}}>
              <thead>
                <tr>
                  <th style={{...S.th, width:52, position:"sticky", top:0, left:0, zIndex:3, background:theme.surface}}>時</th>
                  {weekDates.map((d,i)=>{
                    const isT = formatDate(d)===todayStr;
                    return (
                      <th key={i} style={{...S.th, position:"sticky", top:0, zIndex:2, background:theme.surface, color:isT?theme.accent:(i>=5?"#e88":theme.text), borderBottom:isT?`2px solid ${theme.accent}`:`1px solid ${theme.border}`}}>
                        <div style={{fontSize:11, color:theme.textMuted}}>{DAY_NAMES[i]}</div>
                        <div style={{fontSize:16, fontWeight:700}}>{d.getDate()}</div>
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {HOURS.map(hour=>(
                  <tr key={hour}>
                    <td style={{...S.td, textAlign:"center", fontSize:12, color:theme.textMuted, background:theme.surface, position:"sticky", left:0, zIndex:1, fontWeight:600}}>{hour}:00</td>
                    {weekDates.map((d,di)=>{
                      const slotRsvs = getSlotRsvs(d, hour);
                      const seat1 = slotRsvs.find(r=>r.seat===1);
                      const seat2 = slotRsvs.find(r=>r.seat===2);
                      const isT = formatDate(d)===todayStr;
                      return (
                        <td key={di} style={{...S.td, padding:2, background:isT?"#1a1a14":"transparent", verticalAlign:"top"}}>
                          <div style={{display:"flex", gap:2, height:52}}>
                            {[{seat:1,rsv:seat1},{seat:2,rsv:seat2}].map(({seat,rsv})=>(
                              <div key={seat} onClick={()=>handleCellClick(d,hour,seat)}
                                style={{flex:1, borderRadius:5, cursor:"pointer", transition:"all 0.15s", background:rsv?`${theme.accentDark}cc`:"transparent", border:rsv?`1px solid ${theme.accent}`:`1px dashed ${theme.border}`, padding:"2px 4px", overflow:"hidden", display:"flex", flexDirection:"column", justifyContent:"center"}}
                                onMouseEnter={e=>{if(!rsv)e.currentTarget.style.background="#2a2820";}}
                                onMouseLeave={e=>{if(!rsv)e.currentTarget.style.background="transparent";}}>
                                {rsv ? (
                                  <>
                                    <div style={{fontSize:10, color:theme.accentLight, fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{rsv.customerName}</div>
                                    <div style={{fontSize:9, color:theme.textMuted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{rsv.menuName}</div>
                                  </>
                                ) : (
                                  <div style={{fontSize:9, color:theme.textDim, textAlign:"center"}}>席{seat}</div>
                                )}
                              </div>
                            ))}
                          </div>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {modal && <ReservationModal slot={modal.slot} customers={customers} menus={menus} existing={modal.existing} onSave={handleSave} onClose={()=>setModal(null)} onDelete={handleDelete}/>}
        </div>
      );
    }

    // ========== CUSTOMER LIST ==========
    function CustomerListView({ customers, reservations, onAdd, onEdit, onDelete }) {
      const [search, setSearch] = useState("");
      const [modal, setModal] = useState(null);
      const filtered = customers.filter(c=>c.name.includes(search)||c.phone.includes(search)||c.email.includes(search));
      const visits = id => reservations.filter(r=>r.customerId===id).length;
      const spend = id => reservations.filter(r=>r.customerId===id).reduce((s,r)=>s+(r.price||0),0);
      return (
        <div style={{flex:1}}>
          <div style={{display:"flex", gap:12, marginBottom:16}}>
            <input style={{...S.input, flex:1, marginBottom:0}} placeholder="🔍 名前・電話・メールで検索" value={search} onChange={e=>setSearch(e.target.value)}/>
            <button style={S.btnPrimary} onClick={()=>setModal({mode:"new"})}>＋ 新規登録</button>
          </div>
          <div style={{overflow:"auto"}}>
            <table style={{width:"100%", borderCollapse:"collapse"}}>
              <thead>
                <tr>{["名前","電話番号","メール","来店回数","累計金額","メモ","操作"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {filtered.map(c=>(
                  <tr key={c.id} style={{borderBottom:`1px solid ${theme.border}`}} onMouseEnter={e=>e.currentTarget.style.background="#1e1c18"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{...S.td, fontWeight:600, color:theme.text}}>{c.name}</td>
                    <td style={S.td}>{c.phone}</td>
                    <td style={S.td}>{c.email}</td>
                    <td style={{...S.td, textAlign:"center", color:theme.accent, fontWeight:700}}>{visits(c.id)}回</td>
                    <td style={{...S.td, textAlign:"right", color:theme.accentLight, fontWeight:700}}>¥{spend(c.id).toLocaleString()}</td>
                    <td style={{...S.td, color:theme.textMuted, fontSize:12}}>{c.memo}</td>
                    <td style={S.td}>
                      <div style={{display:"flex", gap:6}}>
                        <button style={S.actionBtn} onClick={()=>setModal({mode:"edit",customer:c})}>編集</button>
                        <button style={{...S.actionBtn, color:theme.danger}} onClick={()=>onDelete(c.id)}>削除</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {modal && <CustomerModal customer={modal.mode==="edit"?modal.customer:null} onSave={c=>{modal.mode==="edit"?onEdit(c):onAdd(c);setModal(null);}} onClose={()=>setModal(null)}/>}
        </div>
      );
    }

    // ========== MENU VIEW ==========
    function MenuView({ menus, onAdd, onEdit, onDelete }) {
      const [modal, setModal] = useState(null);
      return (
        <div style={{flex:1}}>
          <div style={{display:"flex", justifyContent:"flex-end", marginBottom:16}}>
            <button style={S.btnPrimary} onClick={()=>setModal({mode:"new"})}>＋ メニュー追加</button>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:14}}>
            {menus.map(m=>(
              <div key={m.id} style={S.menuCard}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:17, fontWeight:700, color:theme.text, marginBottom:6}}>{m.name}</div>
                    <div style={{fontSize:13, color:theme.textMuted}}>⏱ {m.duration}分</div>
                  </div>
                  <div style={{fontSize:22, fontWeight:800, color:theme.accent}}>¥{m.price.toLocaleString()}</div>
                </div>
                <div style={{display:"flex", gap:8, marginTop:14}}>
                  <button style={{...S.actionBtn, flex:1}} onClick={()=>setModal({mode:"edit",menu:m})}>編集</button>
                  <button style={{...S.actionBtn, flex:1, color:theme.danger}} onClick={()=>onDelete(m.id)}>削除</button>
                </div>
              </div>
            ))}
          </div>
          {modal && <MenuModal menu={modal.mode==="edit"?modal.menu:null} onSave={m=>{modal.mode==="edit"?onEdit(m):onAdd(m);setModal(null);}} onClose={()=>setModal(null)}/>}
        </div>
      );
    }

    // ========== SALES VIEW ==========
    function SalesView({ reservations, menus }) {
      const [period, setPeriod] = useState("month");
      const [selMonth, setSelMonth] = useState(()=>{const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;});
      const filtered = reservations.filter(r=>{
        if(period==="month") return r.date?.startsWith(selMonth);
        if(period==="today") return r.date===formatDate(new Date());
        return true;
      });
      const totalSales = filtered.reduce((s,r)=>s+(r.price||0),0);
      const totalCount = filtered.length;
      const menuStats = menus.map(m=>{const rs=filtered.filter(r=>r.menuId===m.id);return {...m,count:rs.length,total:rs.reduce((s,r)=>s+(r.price||0),0)};}).filter(m=>m.count>0).sort((a,b)=>b.total-a.total);
      const dailyMap={};filtered.forEach(r=>{dailyMap[r.date]=(dailyMap[r.date]||0)+(r.price||0);});
      const dailyEntries=Object.entries(dailyMap).sort(([a],[b])=>a.localeCompare(b));
      const maxDaily=Math.max(...dailyEntries.map(([,v])=>v),1);
      const exportCSV=()=>{
        const hdr="日付,時間,席,顧客名,メニュー,金額,メモ";
        const rows=filtered.map(r=>`${r.date},${r.hour}:00,${r.seat},${r.customerName||""},${r.menuName||""},${r.price||0},${r.note||""}`);
        const blob=new Blob(["\uFEFF"+[hdr,...rows].join("\n")],{type:"text/csv;charset=utf-8;"});
        const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`売上_${selMonth}.csv`; a.click();
      };
      return (
        <div style={{flex:1}}>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20, flexWrap:"wrap"}}>
            {[["today","今日"],["month","月別"],["all","全期間"]].map(([v,l])=>(
              <button key={v} onClick={()=>setPeriod(v)} style={{...S.navBtn,...(period===v?{background:theme.accent,color:"#000",border:`1px solid ${theme.accent}`}:{})}}>{l}</button>
            ))}
            {period==="month" && <input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{...S.input,marginBottom:0,width:"auto",padding:"6px 12px"}}/>}
            <div style={{flex:1}}/>
            <button style={S.btnPrimary} onClick={exportCSV}>📥 CSV ダウンロード</button>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(160px, 1fr))", gap:14, marginBottom:24}}>
            <div style={S.kpiCard}><div style={S.kpiLabel}>売上合計</div><div style={S.kpiValue}>¥{totalSales.toLocaleString()}</div></div>
            <div style={S.kpiCard}><div style={S.kpiLabel}>予約件数</div><div style={S.kpiValue}>{totalCount}件</div></div>
            <div style={S.kpiCard}><div style={S.kpiLabel}>客単価</div><div style={S.kpiValue}>¥{totalCount>0?Math.round(totalSales/totalCount).toLocaleString():0}</div></div>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:20}}>
            <div style={S.card}>
              <h3 style={S.cardTitle}>メニュー別売上</h3>
              {menuStats.length===0?<p style={{color:theme.textMuted,fontSize:13}}>データなし</p>:menuStats.map(m=>(
                <div key={m.id} style={{marginBottom:12}}>
                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                    <span style={{color:theme.text,fontSize:13}}>{m.name} <span style={{color:theme.textMuted}}>×{m.count}</span></span>
                    <span style={{color:theme.accentLight,fontWeight:700,fontSize:13}}>¥{m.total.toLocaleString()}</span>
                  </div>
                  <div style={{background:theme.border,borderRadius:3,height:6}}>
                    <div style={{background:theme.accent,height:6,borderRadius:3,width:`${(m.total/totalSales)*100}%`,transition:"width 0.5s"}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={S.card}>
              <h3 style={S.cardTitle}>日別売上</h3>
              {dailyEntries.length===0?<p style={{color:theme.textMuted,fontSize:13}}>データなし</p>:(
                <div style={{display:"flex", alignItems:"flex-end", gap:4, height:140, overflow:"auto"}}>
                  {dailyEntries.map(([date,val])=>(
                    <div key={date} style={{flex:1, minWidth:24, display:"flex", flexDirection:"column", alignItems:"center", gap:4}}>
                      <div style={{width:"100%",background:theme.accent,borderRadius:"3px 3px 0 0",height:`${(val/maxDaily)*100}px`,transition:"height 0.4s",minHeight:4}} title={`¥${val.toLocaleString()}`}/>
                      <div style={{fontSize:9,color:theme.textMuted,writingMode:"vertical-rl",height:32}}>{date.slice(5)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <div style={{...S.card, marginTop:20}}>
            <h3 style={S.cardTitle}>予約一覧</h3>
            <div style={{overflow:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>{["日付","時間","席","顧客名","メニュー","金額","メモ"].map(h=><th key={h} style={{...S.th,fontSize:12}}>{h}</th>)}</tr></thead>
                <tbody>
                  {[...filtered].sort((a,b)=>(b.date+b.hour).localeCompare(a.date+a.hour)).map(r=>(
                    <tr key={r.id} style={{borderBottom:`1px solid ${theme.border}`}}>
                      <td style={S.td}>{r.date}</td>
                      <td style={S.td}>{r.hour}:00</td>
                      <td style={{...S.td,textAlign:"center"}}>席{r.seat}</td>
                      <td style={{...S.td,color:theme.text,fontWeight:600}}>{r.customerName}</td>
                      <td style={S.td}>{r.menuName}</td>
                      <td style={{...S.td,textAlign:"right",color:theme.accentLight,fontWeight:700}}>¥{(r.price||0).toLocaleString()}</td>
                      <td style={{...S.td,color:theme.textMuted}}>{r.note}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ========== MAIN APP ==========
    function App() {
      const [tab, setTab] = useState("calendar");
      const [reservations, setReservations] = useState(()=>{try{return JSON.parse(localStorage.getItem("reservations")||"[]");}catch{return [];}});
      const [customers, setCustomers] = useState(()=>{try{return JSON.parse(localStorage.getItem("customers")||JSON.stringify(INITIAL_CUSTOMERS));}catch{return INITIAL_CUSTOMERS;}});
      const [menus, setMenus] = useState(()=>{try{return JSON.parse(localStorage.getItem("menus")||JSON.stringify(INITIAL_MENUS));}catch{return INITIAL_MENUS;}});
      const [showSheets, setShowSheets] = useState(false);

      useEffect(()=>{localStorage.setItem("reservations",JSON.stringify(reservations));},[reservations]);
      useEffect(()=>{localStorage.setItem("customers",JSON.stringify(customers));},[customers]);
      useEffect(()=>{localStorage.setItem("menus",JSON.stringify(menus));},[menus]);

      const addRsv = r => setReservations(p=>[...p,r]);
      const editRsv = r => { if(r.__delete) setReservations(p=>p.filter(x=>x.id!==r.id)); else setReservations(p=>p.map(x=>x.id===r.id?r:x)); };

      const TABS = [
        {key:"calendar",label:"📅 予約カレンダー"},
        {key:"customers",label:"👤 顧客リスト"},
        {key:"menus",label:"✂️ メニュー設定"},
        {key:"sales",label:"💴 売上管理"},
      ];
      const todayRsvs = reservations.filter(r=>r.date===formatDate(new Date()));

      return (
        <div style={{background:theme.bg, minHeight:"100vh", fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif", color:theme.textMuted, display:"flex", flexDirection:"column"}}>
          {/* Header */}
          <div style={{background:theme.surface, borderBottom:`1px solid ${theme.border}`, padding:"14px 24px", display:"flex", alignItems:"center", gap:16}}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <div style={{width:36,height:36,background:theme.accent,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>✂</div>
              <div>
                <div style={{color:theme.text,fontWeight:800,fontSize:16,letterSpacing:"0.05em"}}>BARBER MANAGER</div>
                <div style={{color:theme.textMuted,fontSize:10}}>理容室予約管理システム</div>
              </div>
            </div>
            <div style={{flex:1}}/>
            <div style={{background:theme.card,borderRadius:8,padding:"6px 14px",border:`1px solid ${theme.border}`}}>
              <span style={{fontSize:11,color:theme.textMuted}}>今日の予約　</span>
              <span style={{color:theme.accent,fontWeight:700}}>{todayRsvs.length}件</span>
            </div>
            <button style={{...S.navBtn,fontSize:12}} onClick={()=>setShowSheets(true)}>📊 Google Sheets 連携</button>
          </div>

          {/* Tabs */}
          <div style={{background:theme.surface, borderBottom:`1px solid ${theme.border}`, padding:"0 24px", display:"flex"}}>
            {TABS.map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} style={{background:"none",border:"none",padding:"14px 18px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,color:tab===t.key?theme.accent:theme.textMuted,borderBottom:tab===t.key?`2px solid ${theme.accent}`:"2px solid transparent",transition:"all 0.2s"}}>
                {t.label}
              </button>
            ))}
          </div>

          {/* Main */}
          <div style={{flex:1, padding:24, display:"flex", flexDirection:"column", overflow:"hidden"}}>
            {tab==="calendar" && <CalendarView reservations={reservations} customers={customers} menus={menus} onAddReservation={addRsv} onEditReservation={editRsv}/>}
            {tab==="customers" && <CustomerListView customers={customers} reservations={reservations} onAdd={c=>setCustomers(p=>[...p,c])} onEdit={c=>setCustomers(p=>p.map(x=>x.id===c.id?c:x))} onDelete={id=>setCustomers(p=>p.filter(c=>c.id!==id))}/>}
            {tab==="menus" && <MenuView menus={menus} onAdd={m=>setMenus(p=>[...p,m])} onEdit={m=>setMenus(p=>p.map(x=>x.id===m.id?m:x)) } onDelete={id=>setMenus(p=>p.filter(m=>m.id!==id))}/>}
            {tab==="sales" && <SalesView reservations={reservations} menus={menus}/>}
          </div>

          {showSheets && <GoogleSheetsModal onClose={()=>setShowSheets(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
